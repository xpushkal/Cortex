version: 2
updates:
  - package-ecosystem: uv
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: chore(deps)

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: ci(deps)

  - package-ecosystem: npm
    directory: "/apps/admin"
    schedule:
      interval: weekly
    commit-message:
      prefix: chore(deps)

  - package-ecosystem: docker
    directories:
      - "/apps/api"
      - "/apps/workers"
    schedule:
      interval: weekly
    commit-message:
      prefix: chore(deps)
