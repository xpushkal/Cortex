# Nightly full eval run. Emits the markdown+JSON quality report and (M1+) pushes
# headline metrics to Prometheus so Grafana tracks retrieval quality over time
# (docs/RETRIEVAL_AND_ML.md §5.5). Manual dispatch supported.
name: eval

on:
  schedule:
    - cron: "0 6 * * *"  # 06:00 UTC daily
  workflow_dispatch:

jobs:
  eval:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: cortex
          POSTGRES_PASSWORD: cortex
          POSTGRES_DB: cortex
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U cortex" --health-interval 5s
          --health-timeout 3s --health-retries 10
      qdrant:
        image: qdrant/qdrant:latest
        ports: ["6333:6333"]
    env:
      POSTGRES_DSN: postgresql+asyncpg://cortex:cortex@localhost:5432/cortex
      QDRANT_URL: http://localhost:6333
      EVAL_GATE: advisory
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv sync --all-extras
      - name: migrate
        run: uv run alembic upgrade head
      - name: run eval suite
        run: uv run pytest -m eval -ra
      - name: upload eval report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-report
          path: .eval-reports/
          if-no-files-found: ignore
