# CI — the doc's pipeline made literal: lint -> typecheck -> unit -> integration
# -> eval-gate -> build image. Deploy stays manual until M4 (see release.yml).
name: ci

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: lint + types
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv sync --all-extras
      - name: ruff lint
        run: uv run ruff check .
      - name: ruff format
        run: uv run ruff format --check .
      - name: mypy (strict)
        run: uv run mypy

  test:
    name: unit + integration
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: cortex
          POSTGRES_PASSWORD: cortex
          POSTGRES_DB: cortex
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U cortex" --health-interval 5s
          --health-timeout 3s --health-retries 10
      redis:
        image: redis:7
        ports: ["6379:6379"]
      qdrant:
        image: qdrant/qdrant:latest
        ports: ["6333:6333"]
    env:
      POSTGRES_DSN: postgresql+asyncpg://cortex:cortex@localhost:5432/cortex
      QDRANT_URL: http://localhost:6333
      REDIS_URL: redis://localhost:6379/0
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv sync --all-extras
      - name: migrate
        run: uv run alembic upgrade head
      - name: tests + coverage
        run: uv run pytest --cov --cov-report=term-missing

  eval-gate:
    name: eval gate (blocking)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: cortex
          POSTGRES_PASSWORD: cortex
          POSTGRES_DB: cortex
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U cortex" --health-interval 5s
          --health-timeout 3s --health-retries 10
      qdrant:
        image: qdrant/qdrant:latest
        ports: ["6333:6333"]
    env:
      POSTGRES_DSN: postgresql+asyncpg://cortex:cortex@localhost:5432/cortex
      QDRANT_URL: http://localhost:6333
      # Blocking since M1: a regression below docs/RETRIEVAL_AND_ML.md §5.4 fails the build.
      EVAL_GATE: blocking
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv sync --all-extras
      - name: migrate
        run: uv run alembic upgrade head
      - name: retrieval/extraction quality gate
        run: uv run pytest -m eval
      - name: upload eval report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-report
          path: .eval-reports/
          if-no-files-found: ignore

  build-images:
    name: build images
    needs: [quality, test]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: build api image (no push)
        run: docker build -f apps/api/Dockerfile -t cortex-api:ci .
      - name: build worker image (no push)
        run: docker build -f apps/workers/Dockerfile -t cortex-workers:ci .
