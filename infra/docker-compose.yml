# Local development infra for Cortex. Brings up the full stack the docs assume:
# Postgres (relational + graph + process registry), Qdrant (vectors), Redis
# (queue + rate-limit buckets + cache), and the observability trio
# (OTel collector -> Prometheus -> Grafana). Usage: `just up` / `just down`.

name: cortex

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: cortex
      POSTGRES_PASSWORD: cortex
      POSTGRES_DB: cortex
    ports:
      # Host port 5433 to avoid clashing with a system Postgres on 5432.
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cortex"]
      interval: 5s
      timeout: 3s
      retries: 10

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"  # REST
      - "6334:6334"  # gRPC
    volumes:
      - qdrantdata:/qdrant/storage

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  # arq ingestion worker. Opt-in (drains the ingest queue): `docker compose
  # --profile worker up worker`. The API must run with CORTEX_WORKER_ASYNC=true to
  # enqueue rather than ingest inline.
  worker:
    profiles: ["worker"]
    build:
      context: ..
      dockerfile: apps/workers/Dockerfile
    environment:
      REDIS_URL: "redis://redis:6379/0"
      POSTGRES_DSN: "postgresql+asyncpg://cortex:cortex@postgres:5432/cortex"
      QDRANT_URL: "http://qdrant:6333"
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      redis:
        condition: service_started

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    command: ["--config=/etc/otel/collector-config.yaml"]
    volumes:
      - ./otel/collector-config.yaml:/etc/otel/collector-config.yaml:ro
    ports:
      - "4317:4317"  # OTLP gRPC
      - "4318:4318"  # OTLP HTTP
    depends_on:
      - prometheus
      - tempo

  tempo:
    image: grafana/tempo:latest
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    volumes:
      - ./tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempodata:/var/tempo
    ports:
      - "3200:3200"  # Tempo query API (Grafana datasource)

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

volumes:
  pgdata:
  qdrantdata:
  redisdata:
  tempodata:
