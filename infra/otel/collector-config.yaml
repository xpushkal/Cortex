# OpenTelemetry Collector — receives OTLP traces/metrics from the API and workers
# and exposes Prometheus-scrapeable metrics. Spans across API -> retrieve -> rerank
# -> LLM and connector -> worker -> store (docs/ARCHITECTURE.md §9).

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch: {}

exporters:
  # Metrics scraped by Prometheus at :8889.
  prometheus:
    endpoint: 0.0.0.0:8889
  # Traces forwarded to Tempo (Grafana reads them from there).
  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true
  debug:
    verbosity: normal

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/tempo, debug]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [prometheus]
