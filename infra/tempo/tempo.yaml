# Minimal single-binary Tempo for local dev. Receives traces over OTLP (from the
# collector) and serves them to Grafana via the query API on :3200.

server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317

storage:
  trace:
    backend: local
    local:
      path: /var/tempo/blocks
    wal:
      path: /var/tempo/wal
