[project]
name = "cortex-agent"
version = "0.0.0"
description = "Cortex reference agent: consumes the skills file and completes grounded tasks."
requires-python = ">=3.12"
dependencies = ["pydantic>=2.7"]

[project.optional-dependencies]
# The LLM agent variant (CORTEX_AGENT=llm). Kept optional so the base install
# stays light; the deterministic reference agent needs nothing.
llm = ["anthropic>=0.50"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/cortex"]
