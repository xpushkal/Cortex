[project]
name = "cortex-storage"
version = "0.0.0"
description = "Cortex persistence: async SQLAlchemy models/session (Postgres) and the Qdrant client."
requires-python = ">=3.12"
dependencies = [
    "sqlalchemy[asyncio]>=2.0",
    "asyncpg>=0.29",
    "qdrant-client>=1.11",
    "pydantic>=2.7",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/cortex"]
