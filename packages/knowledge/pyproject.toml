[project]
name = "cortex-knowledge"
version = "0.0.0"
description = "Cortex knowledge plane: entity/relation extraction and versioned process objects."
requires-python = ">=3.12"
dependencies = ["pydantic>=2.7"]

[project.optional-dependencies]
# LLM-backed extraction (M2). Kept optional so the base install stays light.
llm = ["anthropic>=0.50"]
# Embedding-similarity entity resolution (optional; off by default).
ml = ["sentence-transformers>=3.0", "torch>=2.3"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/cortex"]
