[project]
name = "cortex-obs"
version = "0.0.0"
description = "Cortex observability: OpenTelemetry tracing setup shared by every service."
requires-python = ">=3.12"
dependencies = [
    "opentelemetry-sdk>=1.27",
    "opentelemetry-exporter-otlp-proto-grpc>=1.27",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/cortex"]
