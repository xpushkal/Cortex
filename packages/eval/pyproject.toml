[project]
name = "cortex-eval"
version = "0.0.0"
description = "Cortex evaluation harness: golden sets, metrics, and the CI regression gate."
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.7",
    "numpy>=1.26",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/cortex"]
