[project]
name = "cortex-connectors"
version = "0.0.0"
description = "Cortex source connectors: Slack, Gmail, Notion, GitHub, Linear, files, sample."
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.7",
    "httpx>=0.27",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/cortex"]
