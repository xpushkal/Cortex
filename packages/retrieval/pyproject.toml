[project]
name = "cortex-retrieval"
version = "0.0.0"
description = "Cortex retrieval: source-aware chunking, embeddings, hybrid retrieve + rerank."
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.7",
    "qdrant-client>=1.11",
]

[project.optional-dependencies]
# Heavy ML deps kept optional so base `uv sync` stays fast. Install with
# `uv sync --extra ml` (or --all-extras) when working on embeddings/rerank.
ml = ["sentence-transformers>=3.0", "torch>=2.3"]
# LLM-generated contextual blurbs (CORTEX_BLURB_MODE=llm); template mode needs nothing.
llm = ["anthropic>=0.50"]
onnx = ["onnxruntime>=1.18"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/cortex"]
